[project]
name = "duyi-utils"
version = "0.1.0"
description = "渡一公共工具包"
requires-python = ">=3.13"
dependencies = ["bcrypt==5.0.0", "oss2==2.19.0", "pyjwt==2.13.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/duyi_utils"]
